name: Upload SUPABASE_SERVICE_ROLE_KEY to Cloudflare Worker
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  upload-secret:
    name: Upload SUPABASE_SERVICE_ROLE_KEY
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Upload SUPABASE_SERVICE_ROLE_KEY to Cloudflare
        run: |
          if [ -z "$CF_API_TOKEN" ]; then echo "ERROR: CF_API_TOKEN repo secret is missing"; exit 1; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "ERROR: SUPABASE_SERVICE_ROLE_KEY repo secret is missing"; exit 1; fi
          # Use a current wrangler (v2 is EOL and cannot read wrangler.jsonc). Target the
          # worker by name explicitly so this does not depend on config parsing.
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx --yes wrangler@latest secret put SUPABASE_SERVICE_ROLE_KEY --name aylmer-abode-finder
