name: Upload SUPABASE_SERVICE_ROLE_KEY to Cloudflare Worker
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  upload-secret:
    name: Upload SUPABASE_SERVICE_ROLE_KEY
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install wrangler
        run: npm install -g wrangler@2 || true

      - name: Upload SUPABASE_SERVICE_ROLE_KEY to Cloudflare
        run: |
          if [ -z "$CF_API_TOKEN" ]; then echo "ERROR: CF_API_TOKEN repo secret is missing"; exit 1; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "ERROR: SUPABASE_SERVICE_ROLE_KEY repo secret is missing"; exit 1; fi
          # wrangler will read CF_API_TOKEN from the environment. The worker name comes from wrangler.jsonc.
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
